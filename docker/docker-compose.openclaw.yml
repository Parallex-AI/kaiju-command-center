services:
  openclaw:
    build:
      context: ..
      dockerfile: docker/openclaw.Dockerfile
    ports:
      - "8100:8100"
    environment:
      - PORT=8100
      - OPENCLAW_ENV=local
      - OPENCLAW_API_AUTH_ENABLED=false
      - OPENCLAW_ALLOWED_ORIGINS=*
      - OPENCLAW_AUDIT_ENABLED=true
      - MEMORY_ENABLED=true
      - N8N_ADS_WEBHOOK_URL=https://flows.kaiju.digital/webhook/ads-agent-demo
      - N8N_WEBHOOK_TIMEOUT=15
    volumes:
      - ../memory:/app/memory
      - ../openclaw/audit:/app/openclaw/audit
